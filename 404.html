<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>الصفحة غير موجودة | Flower Stalk</title>
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#3A5A40" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=El+Messiri:wght@600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body{
      margin:0; min-height:100dvh; display:flex; align-items:center; justify-content:center;
      background:#FAF6EF; color:#243024; font-family:"Tajawal",sans-serif; text-align:center; padding:24px;
    }
    .box{ max-width:480px; }
    .mark{ margin-bottom:18px; }
    h1{ font-family:"El Messiri",sans-serif; font-size:clamp(2.4rem,8vw,3.6rem); color:#2F4A35; margin:0 0 8px; }
    h2{ font-family:"El Messiri",sans-serif; font-size:1.4rem; color:#2F4A35; margin:0 0 12px; font-weight:600; }
    p{ color:#5E6B5C; margin:0 0 26px; }
    a.btn{
      display:inline-flex; align-items:center; justify-content:center;
      background:#3A5A40; color:#fff; font-weight:700; text-decoration:none;
      padding:14px 28px; border-radius:999px; min-height:52px;
      transition:transform .16s cubic-bezier(.23,1,.32,1), background-color .2s;
    }
    a.btn:hover{ background:#314e37; }
    a.btn:active{ transform:scale(.97); }
    a.btn:focus-visible{ outline:3px solid #5C7A57; outline-offset:2px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="mark">
      <svg viewBox="0 0 64 64" width="64" height="64" aria-hidden="true">
        <g fill="#F4C9D0"><circle cx="32" cy="20" r="6"/><circle cx="22" cy="26" r="5"/><circle cx="42" cy="26" r="5"/><circle cx="26" cy="16" r="4.5"/><circle cx="38" cy="16" r="4.5"/></g>
        <circle cx="32" cy="22" r="3.4" fill="#E8A0AE"/>
        <path d="M32 44 C32 36 32 30 32 24" fill="none" stroke="#3A5A40" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>٤٠٤</h1>
    <h2>الصفحة غير موجودة</h2>
    <p>يبدو أن هذه الباقة قد تبعثرت. لنعد بك إلى الصفحة الرئيسية.</p>
    <a href="/flower-stalk/" class="btn">العودة للرئيسية</a>
  </div>
</body>
</html>
